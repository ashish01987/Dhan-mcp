services:
  dhan-mcp:
    build: .
    image: dhan-mcp:latest
    container_name: dhan-mcp-server
    restart: unless-stopped
    ports:
      - "${MCP_PORT:-3005}:3005"
    environment:
      # OAuth flow (recommended)
      - DHAN_CLIENT_ID=${DHAN_CLIENT_ID}
      - DHAN_APP_ID=${DHAN_APP_ID}
      - DHAN_APP_SECRET=${DHAN_APP_SECRET}
      # OR static token (pass via command line or env_file)
      - DHAN_ACCESS_TOKEN=${DHAN_ACCESS_TOKEN}
      # Server
      - MCP_TRANSPORT=${MCP_TRANSPORT:-http}
      - MCP_PORT=${MCP_PORT:-3005}
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
