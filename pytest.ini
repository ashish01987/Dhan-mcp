[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    -v
    --strict-markers
    --tb=short
markers =
    integration: marks tests as integration (deselect with '-m "not integration"')
    unit: marks tests as unit tests
    slow: marks tests as slow
